name: elderlink
description: A smartwatch UI prototype for elderly home system
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  vibration: ^3.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  just_audio: ^0.10.5
  audio_session: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - symbol.jpeg
    - assets/audio/alert.mp3
    - assets/audio/song_dill_to_bacha_he_ji.mp3
    - assets/audio/Talawat_Al_Ikhlas.mp3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../mobile/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "../mobile/logo.png"
