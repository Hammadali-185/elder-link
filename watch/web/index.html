<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ElderLink Watch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Watch frame container - circular */
    #watch-frame {
      width: 360px;
      height: 360px;
      border-radius: 50%; /* Fully circular */
      border: 15px solid #2a2a2a; /* 15px solid border */
      background: #000; /* Black background */
      box-shadow:
        0 0 40px rgba(0,0,0,0.8),
        inset 0 0 20px rgba(0,0,0,0.6);
      overflow: hidden;
      position: relative;
    }

    /* Flutter view inside watch frame */
    #watch-frame flutter-view,
    #watch-frame canvas {
      width: 360px !important;
      height: 360px !important;
      display: block;
    }
  </style>
</head>
<body>
  <div id="watch-frame">
    <script src="flutter_bootstrap.js" async></script>
  </div>
</body>
</html>
